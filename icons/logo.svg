<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background Blue Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00c3ff" />
      <stop offset="100%" stop-color="#0062ff" />
    </linearGradient>
    
    <!-- Shield Green Gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2ee59d" />
      <stop offset="100%" stop-color="#147c4e" />
    </linearGradient>

    <!-- Drop Shadow for the Card -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#002b80" flood-opacity="0.3" />
    </filter>

    <!-- Subtle Drop Shadow for the Shield -->
    <filter id="shieldShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.18" />
    </filter>
  </defs>

  <!-- Outer Card (Vector) -->
  <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#bgGrad)" filter="url(#cardShadow)" />

  <!-- Shield Shape (Vector - scaled up in both width and height) -->
  <path d="M 64 22 C 78 22 98 28 104 33 C 104 69 86 92 64 104 C 42 92 24 69 24 33 C 30 28 50 22 64 22 Z" 
        fill="url(#shieldGrad)" 
        stroke="#ffffff" 
        stroke-width="3.5" 
        stroke-linejoin="round" 
        stroke-linecap="round" 
        filter="url(#shieldShadow)" />

  <!-- Outer Eyelid Shape (Vector - scaled up to width=48px, opening height=19.5px, centered at y=56) -->
  <path d="M 40 56 C 49 43 79 43 88 56 C 79 69 49 69 40 56 Z" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="3.2" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- Center Iris/Pupil Ring (Vector - scaled up to r=9.2 to sit symmetrically inside the new opening height) -->
  <circle cx="64" cy="56" r="9.2" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="3.2" />

  <!-- Diagonal Privacy Slash (Vector - scaled up proportionally to fit the larger eye) -->
  <line x1="48.5" y1="69" 
        x2="79.5" y2="43" 
        stroke="#ffffff" 
        stroke-width="3.5" 
        stroke-linecap="round" />
</svg>